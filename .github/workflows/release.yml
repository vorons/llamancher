name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build llamancher
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build g++-14 \
            libgtk-4-dev libadwaita-1-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev libjson-glib-dev \
            pkg-config curl ca-certificates

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-14

      - name: Build binary
        run: cmake --build build --parallel "$(nproc)"

      - name: Strip debug symbols
        run: strip build/llamancher

      - name: Package binary (tar.gz)
        run: |
          mkdir -p dist
          cp build/llamancher dist/
          cp README.md dist/
          echo "llamancher ${{ github.ref_name }}" > dist/VERSION
          tar -czf llamancher-linux-x86_64.tar.gz -C dist .

      - name: Create AppImage
        run: |
          # Download linuxdeploy (extract to avoid FUSE)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O /tmp/linuxdeploy.AppImage
          chmod +x /tmp/linuxdeploy.AppImage
          /tmp/linuxdeploy.AppImage --appimage-extract
          mv squashfs-root /tmp/linuxdeploy
          # Download GTK plugin (shell script, not AppImage)
          mkdir -p /tmp/plugins
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh -O /tmp/plugins/linuxdeploy-plugin-gtk.sh
          chmod +x /tmp/plugins/linuxdeploy-plugin-gtk.sh
          # Download appimagetool (extract to avoid FUSE)
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool.AppImage
          chmod +x /tmp/appimagetool.AppImage
          /tmp/appimagetool.AppImage --appimage-extract
          mv squashfs-root /tmp/appimagetool
          # AppDir
          mkdir -p AppDir/usr/bin
          cp build/llamancher AppDir/usr/bin/
          # Desktop entry
          printf '%s\n' '[Desktop Entry]' 'Type=Application' 'Name=llamancher' 'Exec=llamancher' 'Icon=llamancher' 'Categories=Utility;' 'Terminal=false' 'StartupWMClass=app.saucer.llamancher' > AppDir/llamancher.desktop
          # Icon
          cp assets/llamancher.png AppDir/
          # Bundle shared libraries (WebKitGTK excluded — use system one)
          LINUXDEPLOY_OUTPUT=/dev/null DEPLOY_GTK_VERSION=4 LINUXDEPLOY_PLUGIN_DIR=/tmp/plugins /tmp/linuxdeploy/AppRun --appdir AppDir --exclude-library='libwebkitgtk*' --exclude-library='libjavascriptcoregtk*' --plugin gtk
          # Package as AppImage
          ARCH=x86_64 /tmp/appimagetool/AppRun AppDir

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: llamancher ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            llamancher-linux-x86_64.tar.gz
            llamancher-x86_64.AppImage
