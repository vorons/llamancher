name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build llamancher
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build g++-14 \
            libgtk-4-dev libadwaita-1-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            pkg-config curl ca-certificates

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-14

      - name: Build binary
        run: cmake --build build --parallel "$(nproc)"

      - name: Strip debug symbols
        run: strip build/llamancher

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/llamancher dist/
          cp README.md dist/
          echo "llamancher ${{ github.ref_name }}" > dist/VERSION
          tar -czf llamancher-linux-x86_64.tar.gz -C dist .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: llamancher ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: llamancher-linux-x86_64.tar.gz
