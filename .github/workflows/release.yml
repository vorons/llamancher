name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build llamancher
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build g++-14 \
            libgtk-4-dev libadwaita-1-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev libjson-glib-dev \
            pkg-config curl ca-certificates

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-14

      - name: Build binary
        run: cmake --build build --parallel "$(nproc)"

      - name: Strip debug symbols
        run: strip build/llamancher

      - name: Package binary (tar.gz)
        run: |
          mkdir -p dist
          cp build/llamancher dist/
          cp README.md dist/
          echo "llamancher ${{ github.ref_name }}" > dist/VERSION
          tar -czf llamancher-linux-x86_64.tar.gz -C dist .

      - name: Create AppImage
        run: |
          # Download appimagetool (handle FUSE-less env)
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          if ! /tmp/appimagetool --version &>/dev/null; then
            /tmp/appimagetool --appimage-extract >/dev/null 2>&1
            mv squashfs-root /tmp/appimagetool-root
            TOOL=/tmp/appimagetool-root/AppRun
          else
            TOOL=/tmp/appimagetool
          fi
          # AppDir structure (manual — no linuxdeploy)
          APPDIR=build/llamancher.AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp build/llamancher "$APPDIR/usr/bin/"
          # AppRun entry point (no heredoc — YAML block scalar can't have column-0 lines)
          printf '%s\n' '#!/usr/bin/env bash' 'HERE="$(cd "$(dirname "$0")" && pwd)"' 'exec "$HERE/usr/bin/llamancher" "$@"' > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"
          # Desktop entry + icon (root-level for appimagetool discovery)
          printf '%s\n' '[Desktop Entry]' 'Type=Application' 'Name=llamancher' 'Exec=llamancher' 'Icon=llamancher' 'Categories=Utility;' 'Terminal=false' 'StartupWMClass=app.saucer.llamancher' > "$APPDIR/llamancher.desktop"
          cp assets/llamancher.png "$APPDIR/"
          cp "$APPDIR/llamancher.png" "$APPDIR/.DirIcon"
          # Package
          ARCH=x86_64 "$TOOL" "$APPDIR" build/llamancher-x86_64.AppImage

      - name: Create release
        uses: softprops/action-gh-release@v2.6.0
        with:
          name: llamancher ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            llamancher-linux-x86_64.tar.gz
            build/llamancher-x86_64.AppImage
