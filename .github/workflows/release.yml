name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build llamancher
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build g++-14 \
            libgtk-4-dev libadwaita-1-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            pkg-config curl ca-certificates

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-14

      - name: Build binary
        run: cmake --build build --parallel "$(nproc)"

      - name: Strip debug symbols
        run: strip build/llamancher

      - name: Package binary (tar.gz)
        run: |
          mkdir -p dist
          cp build/llamancher dist/
          cp README.md dist/
          echo "llamancher ${{ github.ref_name }}" > dist/VERSION
          tar -czf llamancher-linux-x86_64.tar.gz -C dist .

      - name: Create AppImage
        run: |
          # Download and extract linuxdeploy + plugins (no FUSE needed)
          for url in "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" "https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage" "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"; do
            name="$(basename "$url")"
            wget -q "$url" -P /tmp
            chmod +x "/tmp/$name"
            "/tmp/$name" --appimage-extract
            mv squashfs-root "/tmp/${name%.AppImage}"
          done
          # AppDir structure
          mkdir -p AppDir/usr/bin
          cp build/llamancher AppDir/usr/bin/
          # Desktop entry
          printf '%s\n' '[Desktop Entry]' 'Type=Application' 'Name=llamancher' 'Exec=llamancher' 'Icon=llamancher' 'Categories=Utility;' 'Terminal=false' > AppDir/llamancher.desktop
          # Icon (256x256 solid PNG via Python)
          printf '%s\n' 'import struct,zlib;w=h=256;bg=bytes([26,26,46]);raw=b""' 'for _ in range(h):raw+=b"\\x00"+bg*w' 'ihdr=struct.pack(">IIBBBBB",w,h,8,2,0,0,0)' 'idat=zlib.compress(raw)' 'crc=lambda d:struct.pack(">I",zlib.crc32(d)&0xffffffff)' 'ck=lambda t,d:struct.pack(">I",len(d))+t+d+crc(t+d)' 'open("AppDir/llamancher.png","wb").write(b"\\x89PNG\\r\\n\\x1a\\n"+ck(b"IHDR",ihdr)+ck(b"IDAT",idat)+ck(b"IEND",b""))' > /tmp/genicon.py
          python3 /tmp/genicon.py
          # Bundle shared libraries (WebKitGTK excluded — use system one)
          LINUXDEPLOY_OUTPUT=/dev/null DEPLOY_GTK_VERSION=4 /tmp/linuxdeploy-x86_64/AppRun --appdir AppDir --exclude-library='libwebkitgtk*' --exclude-library='libjavascriptcoregtk*' --plugin gtk
          # Package as AppImage
          ARCH=x86_64 /tmp/appimagetool-x86_64/AppRun AppDir

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: llamancher ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            llamancher-linux-x86_64.tar.gz
            llamancher-x86_64.AppImage
